<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokémon Memory Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  </head>

  <body>
    <!-- Pokeball decorations -->
    <div class="pokeball-deco pb1"></div>
    <div class="pokeball-deco pb2"></div>

    <div id="app">
      <header id="main-header">
        <div id="logo-area">
          <span class="poke-logo">Pokémon</span>
          <span class="mem-logo">Memory</span>
        </div>
        <div id="theme-toggle">
          <span>☀️</span>
          <label class="toggle-switch">
            <input type="checkbox" id="theme-checkbox" checked />
            <span class="toggle-track"></span>
          </label>
          <span>🌙</span>
        </div>
      </header>

      <section id="controls">
        <div id="difficulty-btns">
          <button class="diff-btn active" data-diff="easy">Easy</button>
          <button class="diff-btn" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
        <div id="action-btns">
          <button id="start-btn">▶ Start</button>
          <button id="reset-btn">↺ Reset</button>
          <button id="powerup-btn" title="Peek at all cards for 3 seconds!">
            ⚡ Peek
          </button>
        </div>
      </section>

      <section id="status-bar">
        <div class="stat-box">
          <div class="stat-label">⏱ Time</div>
          <div class="stat-value" id="timer-display">--</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">👆 Clicks</div>
          <div class="stat-value" id="clicks-display">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">✅ Matched</div>
          <div class="stat-value" id="matched-display">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">❓ Left</div>
          <div class="stat-value" id="left-display">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">🃏 Total</div>
          <div class="stat-value" id="total-display">0</div>
        </div>
        <div class="stat-box" id="powerup-stat">
          <div class="stat-label">⚡ Peeks</div>
          <div class="stat-value" id="powerup-display">3</div>
        </div>
      </section>

      <!-- Loading Spinner -->
      <div id="loading-overlay" style="display: none">
        <div class="pokeball-spinner"></div>
        <p>Catching Pokémon...</p>
      </div>

      <main id="game_grid"></main>

      <div id="message-overlay" style="display: none">
        <div id="message-box">
          <div id="message-icon"></div>
          <h2 id="message-title"></h2>
          <p id="message-body"></p>
          <button id="message-close-btn">Play Again</button>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
